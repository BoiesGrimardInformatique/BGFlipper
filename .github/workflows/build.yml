name: build

# CI BGFlipper OS — Phase 4 (industrialisation).
#
#   job "lint"     : rapide, sans réseau lourd — shellcheck + cohérence du dépôt.
#   job "firmware" : clone le firmware épinglé, applique l'overlay, compile le
#                    firmware complet + les FAP, et archive les artefacts.
#
# Le job "firmware" est volumineux (clone ~500 Mo + toolchain ARM). Il valide
# la chaîne de build à chaque push/PR — voir docs/ROADMAP.md.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Annule les builds redondants sur une même branche/PR.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & cohérence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint des scripts shell
        run: shellcheck scripts/*.sh

      - name: Vérifier la cohérence du dépôt
        run: |
          set -euo pipefail
          test -f firmware.pin
          test -f overlay/UPSTREAM_HASHES.txt
          # firmware.pin doit exposer tag + commit épinglés.
          grep -q '^FIRMWARE_TAG='    firmware.pin
          grep -q '^FIRMWARE_COMMIT=' firmware.pin
          # Tout overlay listé dans UPSTREAM_HASHES.txt doit exister sous overlay/.
          while read -r md5 rel; do
            case "$md5" in ''|\#*) continue ;; esac
            test -f "overlay/$rel" \
              || { echo "!! overlay/$rel listé dans UPSTREAM_HASHES.txt mais absent"; exit 1; }
          done < overlay/UPSTREAM_HASHES.txt
          echo "Cohérence OK."

  firmware:
    name: Build firmware + FAP
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances système
        run: sudo apt-get update && sudo apt-get install -y git python3 build-essential

      - name: Récupérer le firmware upstream épinglé
        run: make setup

      # Cache de la toolchain ARM téléchargée par fbt (placé APRÈS le clone :
      # git clone exige un upstream/ vide, donc on ne restaure pas dedans avant).
      - name: Cache de la toolchain fbt
        uses: actions/cache@v4
        with:
          path: upstream/toolchain
          key: fbt-toolchain-${{ runner.os }}-${{ hashFiles('firmware.pin') }}

      - name: Construire BGFlipper OS (firmware)
        run: make build

      - name: Construire les FAP utilisateur
        run: make apps

      - name: Archiver les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: bgflipper-os-dist
          path: |
            upstream/dist/**
            upstream/build/**/*.fap
          if-no-files-found: warn
          retention-days: 14
